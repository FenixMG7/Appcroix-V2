[build]
  command = "npm run build"
  publish = "dist"

# App Croix est une SPA (React Router). Sans cette règle, actualiser la page
# sur /parent ou /child renverrait une 404 Netlify car ces routes n'existent
# pas en tant que vrais fichiers. On redirige tout vers index.html et React
# Router prend le relais côté client.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
